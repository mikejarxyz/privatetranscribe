<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Transcribe audio and video privately in your browser. PrivateTranscribe.app runs speech recognition locally with no upload, no account, and offline-capable reuse after setup."
    />
    <meta name="application-name" content="PrivateTranscribe.app" />
    <meta name="theme-color" content="#0f172a" />
    <script>
      ;(() => {
        const storedMode = localStorage.getItem('private-transcribe-theme')
        const prefersDark = window.matchMedia(
          '(prefers-color-scheme: dark)',
        ).matches
        const shouldUseDark =
          storedMode === 'dark' || (!storedMode && prefersDark)

        document.documentElement.classList.toggle('dark', shouldUseDark)
        document.documentElement.style.colorScheme = shouldUseDark
          ? 'dark'
          : 'light'
      })()
    </script>
    <link rel="canonical" href="https://privatetranscribe.app/" />

    <meta property="og:site_name" content="PrivateTranscribe.app" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://privatetranscribe.app/" />
    <meta
      property="og:title"
      content="PrivateTranscribe.app | Private Audio and Video Transcription"
    />
    <meta
      property="og:description"
      content="Transcribe audio and video locally in your browser without uploading files or creating an account."
    />
    <meta
      property="og:image"
      content="https://privatetranscribe.app/og-image.jpg"
    />
    <meta property="og:image:type" content="image/jpeg" />
    <meta
      property="og:image:alt"
      content="PrivateTranscribe.app private browser transcription preview"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="PrivateTranscribe.app | Private Audio and Video Transcription"
    />
    <meta
      name="twitter:description"
      content="Private, local-first audio and video transcription that runs in your browser."
    />
    <meta
      name="twitter:image"
      content="https://privatetranscribe.app/og-image.jpg"
    />
    <title>
      PrivateTranscribe.app | Private Audio and Video Transcription in Your
      Browser
    </title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
